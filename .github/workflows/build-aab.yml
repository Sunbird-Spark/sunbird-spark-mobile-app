name: Build Release AAB

on:
  push:
    tags:
      - '*'

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Determine environment and version from tag
        id: env
        run: |
          TAG="${{ github.ref_name }}"
          if [[ "$TAG" == test-* ]]; then
            echo "name=TEST" >> $GITHUB_OUTPUT
            echo "version=${TAG#test-}" >> $GITHUB_OUTPUT
          elif [[ "$TAG" == sandbox-* ]]; then
            echo "name=SANDBOX" >> $GITHUB_OUTPUT
            echo "version=${TAG#sandbox-}" >> $GITHUB_OUTPUT
          else
            echo "::error::Tag must start with test- or sandbox-"
            exit 1
          fi

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'zulu'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android platform and accept licenses
        run: |
          COMPILE_SDK=$(grep 'compileSdkVersion' android/variables.gradle | awk -F'= ' '{print $2}')
          echo "y" | $ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager --install "platforms;android-${COMPILE_SDK}"
          yes | $ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager --licenses || true

      - name: Setup Gradle
        uses: gradle/gradle-build-action@v3

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24.12.0'

      - name: Install dependencies
        run: npm install

      - name: Build web assets
        run: npm run build

      - name: Convert Windows line endings in gradlew
        run: sudo apt update && sudo apt install dos2unix && cd android && dos2unix ./gradlew && cd ..

      - name: Make gradlew executable
        run: chmod +x android/gradlew

      - name: Decode google-services.json
        env:
          TEST_SECRET: ${{ secrets.TEST_GOOGLE_SERVICE_CONTENT }}
          SANDBOX_SECRET: ${{ secrets.SANDBOX_GOOGLE_SERVICE_CONTENT }}
        run: |
          ENV="${{ steps.env.outputs.name }}"
          if [ "$ENV" = "TEST" ]; then
            echo "$TEST_SECRET" | base64 --decode > android/app/google-services.json
          else
            echo "$SANDBOX_SECRET" | base64 --decode > android/app/google-services.json
          fi

      - name: Replace secrets in gradle.properties
        env:
          TEST_MOBILE_APP_KEY: ${{ secrets.TEST_MOBILE_APP_KEY }}
          TEST_MOBILE_APP_SECRET: ${{ secrets.TEST_MOBILE_APP_SECRET }}
          TEST_MOBILE_APP_CONSUMER: ${{ secrets.TEST_MOBILE_APP_CONSUMER }}
          SANDBOX_MOBILE_APP_KEY: ${{ secrets.SANDBOX_MOBILE_APP_KEY }}
          SANDBOX_MOBILE_APP_SECRET: ${{ secrets.SANDBOX_MOBILE_APP_SECRET }}
          SANDBOX_MOBILE_APP_CONSUMER: ${{ secrets.SANDBOX_MOBILE_APP_CONSUMER }}
        run: |
          ENV="${{ steps.env.outputs.name }}"
          if [ "$ENV" = "TEST" ]; then
            BASE_URL="${{ vars.TEST_BASE_URL }}"
            MOBILE_APP_KEY="$TEST_MOBILE_APP_KEY"
            MOBILE_APP_SECRET="$TEST_MOBILE_APP_SECRET"
            MOBILE_APP_CONSUMER="$TEST_MOBILE_APP_CONSUMER"
            PRODUCER_ID="${{ vars.TEST_PRODUCER_ID }}"
          elif [ "$ENV" = "SANDBOX" ]; then
            BASE_URL="${{ vars.SANDBOX_BASE_URL }}"
            MOBILE_APP_KEY="$SANDBOX_MOBILE_APP_KEY"
            MOBILE_APP_SECRET="$SANDBOX_MOBILE_APP_SECRET"
            MOBILE_APP_CONSUMER="$SANDBOX_MOBILE_APP_CONSUMER"
            PRODUCER_ID="${{ vars.SANDBOX_PRODUCER_ID }}"
          fi

          sed -i "s|^base_url=.*|base_url=$BASE_URL|" android/gradle.properties
          sed -i "s|^mobile_app_key=.*|mobile_app_key=$MOBILE_APP_KEY|" android/gradle.properties
          sed -i "s|^mobile_app_secret=.*|mobile_app_secret=$MOBILE_APP_SECRET|" android/gradle.properties
          sed -i "s|^mobile_app_consumer=.*|mobile_app_consumer=$MOBILE_APP_CONSUMER|" android/gradle.properties
          sed -i "s|^producer_id=.*|producer_id=$PRODUCER_ID|" android/gradle.properties

      - name: Decode keystore
        env:
          TEST_SECRET: ${{ secrets.TEST_KEYSTORE }}
          SANDBOX_SECRET: ${{ secrets.SANDBOX_KEYSTORE }}
        run: |
          mkdir -p android/app/keystore
          ENV="${{ steps.env.outputs.name }}"
          if [ "$ENV" = "TEST" ]; then
            echo "$TEST_SECRET" | base64 --decode > android/app/keystore/android_keystore.jks
          else
            echo "$SANDBOX_SECRET" | base64 --decode > android/app/keystore/android_keystore.jks
          fi

      - name: Create signing.properties from JSON secret
        env:
          TEST_SECRET: ${{ secrets.TEST_SIGNING_KEYS }}
          SANDBOX_SECRET: ${{ secrets.SANDBOX_SIGNING_KEYS }}
        run: |
          mkdir -p android/app/keystore
          ENV="${{ steps.env.outputs.name }}"

          trap 'rm -f signing.json' EXIT

          if [ "$ENV" = "TEST" ]; then
            echo "$TEST_SECRET" | base64 --decode > signing.json
          else
            echo "$SANDBOX_SECRET" | base64 --decode > signing.json
          fi

          SIGNING_STORE_PASSWORD=$(jq -r '.SIGNING_STORE_PASSWORD' signing.json)
          SIGNING_KEY_ALIAS=$(jq -r '.SIGNING_KEY_ALIAS' signing.json)
          SIGNING_KEY_PASSWORD=$(jq -r '.SIGNING_KEY_PASSWORD' signing.json)

          touch ${{ github.workspace }}/android/signing.properties
          echo "KEYSTORE=${{ github.workspace }}/android/app/keystore/android_keystore.jks" >> ${{ github.workspace }}/android/signing.properties
          echo "SIGNING_STORE_PASSWORD=$SIGNING_STORE_PASSWORD" >> ${{ github.workspace }}/android/signing.properties
          echo "SIGNING_KEY_ALIAS=$SIGNING_KEY_ALIAS" >> ${{ github.workspace }}/android/signing.properties
          echo "SIGNING_KEY_PASSWORD=$SIGNING_KEY_PASSWORD" >> ${{ github.workspace }}/android/signing.properties

      - name: Capacitor sync
        run: npx cap sync android

      - name: Build release AAB
        run: cd android && ./gradlew bundleRelease --stacktrace

      - name: Verify AAB was created
        run: |
          AAB_FILES=$(find android/app/build/outputs/bundle/release/ -name "*.aab" | wc -l)
          if [ "$AAB_FILES" -eq 0 ]; then
            echo "AAB file not found!"
            ls -la android/app/build/outputs/bundle/release/ || echo "Release directory does not exist"
            exit 1
          fi
          echo "AAB files found:"
          find android/app/build/outputs/bundle/release/ -name "*.aab" -exec ls -la {} \;

      - name: Upload release AAB
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: release-aab
          path: android/app/build/outputs/bundle/release/*.aab

      - name: Upload AAB to Azure Blob Storage
        uses: azure/CLI@v2
        with:
          azcliversion: latest
          inlineScript: |
            AAB_FILE=$(find android/app/build/outputs/bundle/release/ -name "*.aab" | head -1)
            if [ -z "$AAB_FILE" ]; then
              echo "AAB file not found!"
              exit 1
            fi

            echo "Uploading AAB file: $AAB_FILE"

            az storage blob upload \
              --account-name "${{ secrets.AZURE_STORAGE_ACCOUNT }}" \
              --account-key "${{ secrets.AZURE_STORAGE_KEY }}" \
              --container-name "${{ vars.AZURE_CONTAINER_NAME }}" \
              --file "$AAB_FILE" \
              --name "sunbird-${{ steps.env.outputs.name }}-${{ steps.env.outputs.version }}-${{ github.run_number }}.aab" \
              --overwrite

            echo "AAB uploaded: sunbird-${{ steps.env.outputs.name }}-${{ steps.env.outputs.version }}-${{ github.run_number }}.aab"
