<!DOCTYPE html>
<html ng-app="genie-canvas">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="initial-scale=1, maximum-scale=1, user-scalable=no, width=device-width">
    <meta http-equiv='expires' content='0'>
    <meta http-equiv='pragma' content='no-cache'>
    <meta name="viewport" content="width=device-width, initial-scale=1, minimum-scale=1, maximum-scale=1">
    <title></title>

    <!-- injector:css -->
    <link rel="stylesheet" href="style.min.1.1.css">
    <!-- endinjector -->

    <style>
        #gameArea {
            position: absolute;
            left: 50%;
            top: 50%;
        }

        #gameCanvas {
            width: 100%;
            height: 100%;
        }

        .inputText {
            -moz-border-radius: 15px;
            border-radius: 15px;
            border: solid 2px black !important;
            font-size: 15px !important;
            padding-left: 10px !important;
            font-weight: bold !important;
            padding-right: 5px;
            z-index: 1000;
            text-align: center;
        }
    </style>

    <script>
    // Pre-renderer patches — runs before script.min.1.1.js loads.

    // Patch JSON.parse to handle objects passed directly.
    (function () {
        var originalParse = JSON.parse;
        JSON.parse = function (text, reviver) {
            if (typeof text === 'object' && text !== null) return text;
            return originalParse.call(JSON, text, reviver);
        };
    })();

    // Stubs for Cordova/native APIs expected when isMobile=true.
    var noop = function () {};

    // Bridge exit calls from the ECML renderer back to the parent frame.
    // The endpage plugin calls exitApp() → we postMessage EXIT to the React app.
    function postExitToParent() {
        console.log('[ECML-iframe] postExitToParent called');
        window.parent.postMessage({ eid: 'EXIT', edata: { type: 'EXIT' } }, window.location.origin);
    }
    window.exitApp = postExitToParent;
    window.genieservice = {
        getContentMetadata: noop,
        launchPortal: noop,
        endGenieCanvas: postExitToParent,
        showExitConfirmPopup: postExitToParent,
        endContent: noop
    };

    // Ensure window.cordova exists BEFORE script.min.1.1.js loads.
    // The endpage controller checks window.cordova to show the clickable
    // Exit button (ng-if="isCordova"). Without this, Exit is non-interactive.
    if (!window.cordova) {
        window.cordova = { plugins: {}, file: { dataDirectory: '' } };
    }
    window.StatusBar = {
        hide: noop, show: noop, isVisible: true,
        overlaysWebView: noop, styleDefault: noop,
        styleLightContent: noop, styleBlackOpaque: noop,
        styleBlackTranslucent: noop,
        backgroundColorByName: noop, backgroundColorByHexString: noop
    };
    window.MobileAccessibility = { usePreferredTextZoom: noop };
    window.navigationbar = { setUp: noop, hideNavigationBar: noop, showNavigationBar: noop };
    if (!navigator.splashscreen) {
        navigator.splashscreen = { hide: noop, show: noop };
    }
    </script>
</head>

<body ng-controller="BaseCtrl">
    <div id="loading" class="gc-loader-area"></div>

    <div class="content-holder" ng-repeat="template in templates">
        <div ng-include="template.path || template.id"></div>
    </div>

    <!-- injector:js -->
    <script src="script.min.1.1.js"></script>
    <!-- endinjector -->

    <script>
    // The renderer sets isbrowserpreview from the ?webview query param.
    // In Capacitor we are in a mobile webview, not a desktop browser preview,
    // so force it off so the endpage gotTohome() actually calls exitApp().
    if (typeof isbrowserpreview !== 'undefined') isbrowserpreview = false;

    // script.min.1.1.js overwrites window.exitApp with its own version that
    // calls navigator.app.exitApp() (a Cordova API that doesn't exist here).
    // Re-apply our bridge so clicks on the endpage Exit button post EXIT
    // back to the parent React app.
    function postExitToParent() {
        console.log('[ECML-iframe] postExitToParent called');
        window.parent.postMessage({ eid: 'EXIT', edata: { type: 'EXIT' } }, window.location.origin);
    }
    window.exitApp = postExitToParent;
    if (window.genieservice) {
        window.genieservice.endGenieCanvas = postExitToParent;
        window.genieservice.showExitConfirmPopup = postExitToParent;
    }

    // Bridge telemetry events from the renderer to the parent React app.
    // The renderer dispatches CustomEvent("TelemetryEvent") on document inside
    // the iframe — these don't cross the iframe boundary, so we forward them.
    document.addEventListener('TelemetryEvent', function (e) {
        var detail = e.detail;
        if (detail) {
            window.parent.postMessage(detail, window.location.origin);
        }
    });

    // Bridge renderer:content:start → parent as a START event.
    if (typeof EkstepRendererAPI !== 'undefined') {
        EkstepRendererAPI.addEventListener('renderer:content:start', function () {
            console.log('[ECML-iframe] renderer:content:start fired — posting START');
            window.parent.postMessage({
                eid: 'START',
                ets: Date.now(),
                edata: { type: 'START' }
            }, window.location.origin);
        });
    }

    // Bridge renderer:content:end → parent as an END event with summary.
    // EkstepRendererAPI is available after script.min.1.1.js loads.
    // The summary must include progress:100 and endpageseen:true so the
    // content state update hook (useContentStateUpdate) marks it completed.
    if (typeof EkstepRendererAPI !== 'undefined') {
        EkstepRendererAPI.addEventListener('renderer:content:end', function () {
            console.log('[ECML-iframe] renderer:content:end fired — posting END');
            window.parent.postMessage({
                eid: 'END',
                edata: {
                    type: 'END',
                    summary: [
                        { progress: 100 },
                        { endpageseen: true },
                        { visitedcontentend: true }
                    ]
                }
            }, window.location.origin);
        });
    }
    </script>

    <script>
    (function () {
        // Ensure cordova stubs exist after Capacitor may have injected its own.
        var noop = function () {};
        if (!window.cordova) window.cordova = {};
        if (!window.cordova.plugins) window.cordova.plugins = {};
        if (!window.cordova.plugins.Keyboard) {
            window.cordova.plugins.Keyboard = {
                hideKeyboardAccessoryBar: noop, close: noop, show: noop
            };
        }
        if (!window.cordova.file) {
            window.cordova.file = { dataDirectory: '' };
        }

        // Listen for config from parent via postMessage.
        // Validate source and origin to prevent config injection from other frames.
        window.addEventListener('message', function handler(event) {
            if (event.source !== window.parent) return;
            if (event.origin !== window.location.origin) return;
            var data = event.data;
            if (!data || !data.__ecmlPlayerConfig) return;
            window.removeEventListener('message', handler);
            if (window.initializePreview) {
                window.initializePreview(data.config);
            }
        });
    })();
    </script>
</body>

</html>
