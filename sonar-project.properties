# SonarCloud Configuration
sonar.projectKey=sunbirded-mobile-app
sonar.organization=sunbirded

# Project Information
sonar.projectName=SunbirdED Mobile App
sonar.projectVersion=1.0.0

# Source and Test Paths
sonar.sources=src
sonar.tests=src
sonar.test.inclusions=**/*.test.tsx,**/*.test.ts,**/*.spec.tsx,**/*.spec.ts

# Coverage
sonar.javascript.lcov.reportPaths=coverage/lcov.info
sonar.coverage.exclusions=**/*.test.tsx,**/*.test.ts,**/*.spec.tsx,**/*.spec.ts,**/setupTests.ts,**/*.config.ts,**/*.config.js

# Exclusions
sonar.exclusions=node_modules/**,coverage/**,build/**,dist/**,*.config.ts,*.config.js

# TypeScript
sonar.typescript.tsconfigPath=tsconfig.json
